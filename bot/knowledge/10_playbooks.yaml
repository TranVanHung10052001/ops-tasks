# =============================================================================
# Layer 10 — DIAGNOSTIC PLAYBOOKS (Root Cause Trees)
# =============================================================================
# Mục đích: Khi KPI drop, AI biết ngay: hỏi gì? check đâu? escalate ai?
# Dùng cho: /ask "FR HAN đang giảm", smart_agent reasoning, /giao context.
#
# Format: symptom → probable_causes → diagnosis_questions → quick_actions → escalate_if
# Filled: 2026-05-23
# =============================================================================

version: "1.0"
last_updated: "2026-05-23"

playbooks:

  # ─── PB-01: Fill Rate Drop ─────────────────────────────────────────────────
  - id: "PB-01"
    symptom: "FR (Fill Rate) giảm đột ngột hoặc thấp hơn target"
    kpi_keys: ["fill_rate_core_pct", "fill_rate_han_pct", "fill_rate_sgn_pct", "fill_rate_exp_pct"]
    trigger_threshold: "FR drop >3pp WoW hoặc FR < target × 0.90"

    probable_causes:
      - id: "C1"
        cause: "Driver supply thiếu — không đủ driver online trong zone"
        signals: ["Accept time tăng", "Timeout rate tăng", "Active driver count giảm"]
        weight: 0.35

      - id: "C2"
        cause: "SLA/time slot sai — driver reject vì giờ không phù hợp"
        signals: ["Reject rate tăng", "FR giảm theo zone/slot cụ thể", "Morning slot worst"]
        weight: 0.25

      - id: "C3"
        cause: "Giá đơn thấp — driver ưu tiên đơn khác platform"
        signals: ["FR thấp ở zone xa/khó", "Driver online nhưng không nhận đơn"]
        weight: 0.20

      - id: "C4"
        cause: "Surge demand — đột biến đơn trong khi supply flat"
        signals: ["Orders spike", "Event/holiday", "Campaign merchant"]
        weight: 0.15

      - id: "C5"
        cause: "Tech issue — dispatch algo bug hoặc zone config sai"
        signals: ["FR drop đồng đều tất cả zones", "Không có pattern theo giờ/zone"]
        weight: 0.05

    diagnosis_questions:
      - "FR drop ở zone nào? HAN / SGN / KCN / tỉnh?"
      - "FR drop theo time slot? Sáng (8-10h) / trưa / chiều?"
      - "Active driver count hôm nay so với tuần trước?"
      - "Có campaign merchant hoặc event nào tạo demand spike không?"
      - "Reject reason breakdown: timeout / driver reject / no supply?"

    quick_actions:
      - step: 1
        action: "Pull FR breakdown theo zone + slot ngay (Google Sheet / Redash)"
        owner_type: "ops_lead"
        time_to_complete: "30 phút"

      - step: 2
        action: "Kiểm tra active driver count vs cùng giờ tuần trước"
        owner_type: "ops_lead"
        time_to_complete: "15 phút"

      - step: 3
        action: "Nếu supply thiếu → kích hoạt emergency incentive (tăng bonus tạm thời)"
        owner_type: "ops_lead + manager_approval"
        time_to_complete: "1-2 giờ"
        note: "Cần approval manager nếu budget >5M VNĐ"

      - step: 4
        action: "Nếu SLA sai → escalate thonglhn để re-config time slot"
        owner_type: "thonglhn@ahamove.com"
        time_to_complete: "2-4 giờ"

      - step: 5
        action: "Update manager + ghi incident vào task bot"
        owner_type: "all"
        time_to_complete: "15 phút"

    escalate_if:
      - condition: "FR <50% kéo dài >2 giờ"
        escalate_to: "huyle@ahamove.com (Manager)"
        severity: "P0"
      - condition: "FR drop ảnh hưởng key account (KFM, Shopee SLA)"
        escalate_to: "huyle@ahamove.com + BD lead"
        severity: "P0"

  # ─── PB-02: COGS Spike ────────────────────────────────────────────────────
  - id: "PB-02"
    symptom: "COGS GXT/kiện tăng vượt 80K VNĐ hoặc COGS Bulky >30% GSV"
    kpi_keys: ["cogs_gxt_per_order_vnd", "cogs_bulky_pct"]
    trigger_threshold: "COGS GXT >82K VNĐ hoặc COGS Bulky >32%"

    probable_causes:
      - id: "C1"
        cause: "Driver payout tăng — incentive campaign chạy quá scope"
        signals: ["Incentive spend spike", "Driver bonus report tăng"]
        weight: 0.40

      - id: "C2"
        cause: "Order mix shift — đơn zone xa tăng, đơn zone gần giảm"
        signals: ["Average distance tăng", "EXP order ratio tăng"]
        weight: 0.30

      - id: "C3"
        cause: "Thêm cost head chưa chuẩn hóa — phí phụ, phí garage"
        signals: ["COGS tăng đột ngột ngay sau policy change"]
        weight: 0.20

      - id: "C4"
        cause: "Data issue — khai cost sai hoặc order mis-classified"
        signals: ["COGS outlier ở 1-2 driver cụ thể"]
        weight: 0.10

    diagnosis_questions:
      - "COGS tăng từ bao giờ? Có trùng với policy/incentive change không?"
      - "COGS cao nhất ở zone nào / driver tier nào?"
      - "Average payout per order tháng này vs tháng trước?"
      - "Incentive budget đã dùng bao nhiêu % so với allocation?"

    quick_actions:
      - step: 1
        action: "Pull COGS breakdown: payout + incentive + surcharge theo zone"
        owner_type: "thonglhn + BA (Yến)"
        time_to_complete: "1 ngày"
        note: "Action 3.2.1 — đang P0 URGENT, chưa bắt đầu tính 22/05"

      - step: 2
        action: "Identify top 5 highest-cost driver profiles → kiểm tra có hợp lệ không"
        owner_type: "ops_lead"
        time_to_complete: "2 giờ"

      - step: 3
        action: "Nếu incentive quá: tạm dừng hoặc điều chỉnh campaign scope"
        owner_type: "manager_approval"
        time_to_complete: "2 giờ"

      - step: 4
        action: "Nếu order mix: xem xét zone pricing adjustment"
        owner_type: "thanhtq + khanhlv"
        time_to_complete: "1-2 ngày"

    escalate_if:
      - condition: "COGS GXT >85K VNĐ kéo dài >1 tuần"
        escalate_to: "huyle@ahamove.com"
        severity: "P0"
      - condition: "COGS Bulky >35% GSV"
        escalate_to: "huyle@ahamove.com + CFO"
        severity: "P0"

  # ─── PB-03: Driver Churn / D30 Retention Drop ────────────────────────────
  - id: "PB-03"
    symptom: "Driver retention D30 thấp hoặc giảm; active driver count giảm"
    kpi_keys: ["driver_retention_d30", "active_drivers"]
    trigger_threshold: "D30 <62% hoặc active_driver drop >10% WoW"

    probable_causes:
      - id: "C1"
        cause: "Income thấp — driver không đủ orders để đạt target income"
        signals: ["D30 drop, average stop/month thấp", "Mass tier ratio tăng"]
        weight: 0.40

      - id: "C2"
        cause: "Competitor poaching — Grab/Lalamove tăng incentive mạnh"
        signals: ["Churn spike trùng competitor campaign", "Exit survey: 'lương tốt hơn'"]
        weight: 0.30

      - id: "C3"
        cause: "Onboarding friction — driver mới không được support tốt"
        signals: ["D7 retention thấp hơn D30 trend", "Churn concentrate ở new drivers"]
        weight: 0.20

      - id: "C4"
        cause: "App UX issue — driver gặp bug hoặc payment delay"
        signals: ["Support ticket tăng từ driver", "Payment complaint"]
        weight: 0.10

    diagnosis_questions:
      - "Driver churn xảy ra chủ yếu ở week nào trong D30? (D7 / D14 / D21)"
      - "Churn tập trung ở zone nào? HAN vs SGN vs KCN?"
      - "Average stops/month của churned drivers là bao nhiêu?"
      - "Competitor campaign nào đang chạy trong thời điểm này?"

    quick_actions:
      - step: 1
        action: "Kéo cohort D30 breakdown: ai churn, ở zone nào, stop/month"
        owner_type: "khanhlv + ops_lead"
        time_to_complete: "1 ngày"

      - step: 2
        action: "Survey 10-20 churned drivers qua phone: lý do chính là gì?"
        owner_type: "khamnd (driver team)"
        time_to_complete: "2 ngày"

      - step: 3
        action: "Nếu income thấp → xem xét boost orders cho Mass tier driver (targeted dispatch)"
        owner_type: "thonglhn + tech dispatch team"
        time_to_complete: "1 tuần"

      - step: 4
        action: "Nếu competitor: chạy counter-incentive targeted cho at-risk drivers"
        owner_type: "manager_approval"
        time_to_complete: "2-3 ngày"

    escalate_if:
      - condition: "Active driver drop >15% WoW"
        escalate_to: "huyle@ahamove.com"
        severity: "P1"
      - condition: "D30 <55%"
        escalate_to: "huyle@ahamove.com"
        severity: "P0"

  # ─── PB-04: 1st PU On-Time Drop ──────────────────────────────────────────
  - id: "PB-04"
    symptom: "1st Pick-Up On-Time rate giảm — driver đến pick-up muộn hơn slot"
    kpi_keys: ["first_pu_ontime_pct"]
    trigger_threshold: "1st PU <45% hoặc drop >5pp WoW"

    probable_causes:
      - id: "C1"
        cause: "SLA time slot chưa đủ buffer — assignment quá sát giờ PU"
        signals: ["Assignment-to-PU time quá ngắn (<30 phút)", "Driver complaint về OT pressure"]
        weight: 0.45

      - id: "C2"
        cause: "Traffic / zone distance — driver zone quá xa pickup point"
        signals: ["Late rate cao ở inner-city peak hours", "Zone routing không optimal"]
        weight: 0.30

      - id: "C3"
        cause: "Driver behavior — accept nhiều đơn, ưu tiên sai"
        signals: ["Driver với nhiều concurrent orders có late rate cao hơn"]
        weight: 0.15

      - id: "C4"
        cause: "Merchant không sẵn sàng — hàng chưa pack khi driver đến"
        signals: ["Driver wait time tại merchant tăng", "Merchant complaint pattern"]
        weight: 0.10

    diagnosis_questions:
      - "1st PU late rate theo zone? HAN vs SGN vs KCN khác nhau bao nhiêu?"
      - "Average assignment-to-pickup time là bao nhiêu phút?"
      - "Time slot nào có late rate cao nhất? (8-10h / 10-12h / 14-16h)"
      - "SGN đã config SLA xong → HAN đang ở đâu trong quá trình config?"

    quick_actions:
      - step: 1
        action: "Pull 1st PU late breakdown: zone × time slot × driver tier"
        owner_type: "thonglhn + BA"
        time_to_complete: "2 giờ"

      - step: 2
        action: "SGN đã DONE SLA redesign → check HAN SLA config status (action 3.1.2)"
        owner_type: "thonglhn@ahamove.com"
        time_to_complete: "30 phút"

      - step: 3
        action: "Nếu zone routing: điều chỉnh zone boundary hoặc buffer time"
        owner_type: "thonglhn + chienpd (LMS)"
        time_to_complete: "1-3 ngày"

      - step: 4
        action: "Nếu merchant-side: training merchant để pack trước giờ driver đến"
        owner_type: "khanhlv (B2B)"
        time_to_complete: "1 tuần"

    escalate_if:
      - condition: "1st PU <40% kéo dài >2 ngày → risk merchant churn"
        escalate_to: "huyle@ahamove.com"
        severity: "P1"

  # ─── PB-05: GSV Daily Spike / Drop ──────────────────────────────────────────
  - id: "PB-05"
    symptom: "GSV daily thấp hơn target 1.1 tỷ VNĐ hoặc drop >20% WoW"
    kpi_keys: ["gsv_today_b", "orders_today"]
    trigger_threshold: "GSV <0.88 tỷ (= target × 80%) hoặc orders <1200/ngày"

    probable_causes:
      - id: "C1"
        cause: "FR thấp — đơn bị miss không được giao"
        signals: ["FR drop cùng ngày", "Timeout rate tăng"]
        weight: 0.35

      - id: "C2"
        cause: "Demand thấp — merchant order ít hơn (cuối tuần, holiday)"
        signals: ["Pattern WoW consistent", "Không có driver issue"]
        weight: 0.30

      - id: "C3"
        cause: "Tech issue — app down, orders không vào được"
        signals: ["Error rate tăng", "Merchant complaint về app"]
        weight: 0.20

      - id: "C4"
        cause: "Competitor stealing orders — merchant switch sang platform khác"
        signals: ["GSV drop gradual", "Specific merchant account giảm"]
        weight: 0.15

    diagnosis_questions:
      - "GSV drop = orders ít hơn hay AOV thấp hơn?"
      - "Orders giảm ở segment nào: Bulky / GXT / Longhaul?"
      - "Có merchant nào stop ordering đột ngột không?"
      - "FR hôm nay so với hôm qua là bao nhiêu?"

    quick_actions:
      - step: 1
        action: "Check orders count + FR real-time → xác định root cause"
        owner_type: "duty_ops_lead"
        time_to_complete: "15 phút"

      - step: 2
        action: "Nếu FR issue → chạy PB-01 (Fill Rate playbook)"
        link: "PB-01"

      - step: 3
        action: "Nếu merchant drop → B2B team gọi top 10 merchants kiểm tra"
        owner_type: "khanhlv"
        time_to_complete: "1 giờ"

    escalate_if:
      - condition: "GSV <0.77 tỷ (P0 threshold) hoặc <70% target"
        escalate_to: "huyle@ahamove.com"
        severity: "P0"

# ─── Playbook cross-reference matrix ────────────────────────────────────────
cross_reference:
  # Khi FR drop → cũng check GSV (PB-05)
  # Khi COGS spike → cũng check driver incentive pattern (PB-03)
  - trigger: "PB-01 activated"
    also_check: ["PB-05"]

  - trigger: "PB-02 activated"
    also_check: ["PB-03"]
    reason: "High incentive → driver retention OK, nhưng COGS cao → trade-off"

  - trigger: "PB-03 activated"
    also_check: ["PB-01"]
    reason: "Driver churn → less supply → FR drop cascade"

# ─── AI usage instructions ──────────────────────────────────────────────────
ai_usage:
  instruction: |
    Khi user hỏi về KPI drop, AI cần:
    1. Identify playbook phù hợp (match kpi_keys)
    2. List probable_causes theo weight (cao → thấp)
    3. Ask diagnosis_questions để xác định root cause
    4. Suggest quick_actions cụ thể kèm owner
    5. Nếu threshold đạt escalate_if → alert manager ngay

    KHÔNG nên: chỉ nói "cần điều tra thêm" chung chung.
    CẦN nói: "Dựa trên pattern, probable cause #1 là X. Anh kiểm tra [question A] ngay nhé."
