    overlap_segment: ["F&B", "Pharma"]

  - name: "Be Delivery"
    sgn_share_pct: 32
    han_share_pct: 25
    strength: ["Biggest promo spender"]
    weakness: ["Unsustainable burn"]
    threat_level: "VERY HIGH"
    overlap_segment: ["Shopee Instant"]

  - name: "XanhSM"
    sgn_share_pct: 8
    han_share_pct: 10
    strength: ["EV fleet", "Steady growth"]
    weakness: ["Still small"]
