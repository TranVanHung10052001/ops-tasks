company:
  name: "Ahamove"
  tagline: "Tech-driven on-demand logistics platform"
  founded: 2015
  hq: "TP. Hồ Chí Minh"
  website: "https://ahamove.com"
  one_liner: |
    Nền tảng giao hàng on-demand công nghệ — bike (instant delivery) và truck
    (bulky, longhaul, moving) — phục vụ C2C, SME, Enterprise tại VN.

# ─── Market position ──────────────────────────────────────────────────────────
market:
  geography:
    primary: ["HCM", "Hà Nội"]
    tier1: ["Bình Dương", "Đồng Nai", "Hải Phòng", "Đà Nẵng"]
    expansion: ["14+ tỉnh đang mở rộng"]
  scale_2025:
    orders_per_year: 45_500_000     # 45.5M
    gsv_vnd_billion: 2_139          # 2,139 tỷ VNĐ
    gsv_yoy_growth: 0.206           # +20.6% YoY
    bike_drivers: 30_900
    truck_drivers: 4_400
  market_share:
    hcm_pct: 25                     # ~25% SGN (Nov 2025)
    han_pct: 42                     # ~42% HAN (Nov 2025)
  segments_served:
    - C2C (cá nhân gửi cá nhân)
    - SME (doanh nghiệp nhỏ, e-commerce sellers)
    - Enterprise (Shopee, TikTok Shop, Kingfoodmart/Seedlogs, Lazada)

# ─── Services portfolio ──────────────────────────────────────────────────────
services:
  bike:
    - name: "Instant"
      sla: "60 phút"
      tier: "Premium"
    - name: "Eco/Pooling"
      sla: "2-3h"
      tier: "Mass"
    - name: "4H"
      sla: "4 giờ"
      target: "e-commerce sellers"
  truck:
    - name: "Bulky"
      load: "500kg - 2.5T"
      growth_yoy: 0.421           # +42.1% YoY — fastest growing
      target_cogs_pct: 0.30       # COGS target < 30%
    - name: "Longhaul"
      distance: ">40km"
    - name: "House Moving"
      target: "B2C residential"
    - name: "Rental"
      pricing: "4h/8h/12h"
  enterprise:
    - "SME Logistics"
    - "API Integration (Shopee, TikTok Shop)"
    - "Warehouse"
  new_2026:
    - name: "LTL"
      desc: "Ghép hàng, less-than-truckload"
    - name: "Installation"
      desc: "Lắp đặt tại nhà KH"
    - name: "Saver"
      desc: "0% commission funnel"

# ─── Revenue model ────────────────────────────────────────────────────────────
revenue_model:
  primary_streams:
    - source: "Commission"
      take_rate_pct: 0.26                  # ~26% take rate, target stable
      desc: "% trên giá đơn hàng"
    - source: "Platform fee"
      take_rate_pct_range: [0.05, 0.10]    # 5-10%
      desc: "Fee 3PL B2B clients"
    - source: "Add-on services"
      desc: "COD, insurance, packaging"
    - source: "Subscription"
      desc: "Driver packages, fleet rental"

# ─── Unit economics targets ──────────────────────────────────────────────────
unit_economics:
  take_rate_target: 0.26
  cogs_targets:
    bulky_pct: 0.30                        # COGS Bulky < 30%
    gxt_per_order_vnd: 75_000              # COGS GXT target 75K/kiện (từ 80K)
  incentive_budget_pct_of_gsv: 0.025       # 2.5% GSV
  driver_productivity_tiers:
    station: ">120 stop/month"
    core:    ">65 stop/month"
    hub:     ">40 stop/month"
    mass:    ">30 stop/month"
  driver_income_tiers:
    professional_vnd_per_day: 1_000_000   # >1M VNĐ/day
    core_vnd_per_day:         750_000     # >750K
    hub_vnd_per_day:          600_000     # >600K

# ─── Competitive landscape (Nov 2025 snapshot) ────────────────────────────────
competitors:
  - name: "Ahamove"
    sgn_share_pct: 25
    han_share_pct: 42
    strength: ["Cost efficiency", "Truck dominance", "On-demand tech"]

  - name: "Grab Express"
    sgn_share_pct: 34
    han_share_pct: 32
    strength: ["Driver density", "Brand", "EV-ready"]
