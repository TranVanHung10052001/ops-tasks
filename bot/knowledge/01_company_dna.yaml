# ─── Internal jargon / acronyms ──────────────────────────────────────────────
# AI gặp từ này biết ngay nghĩa, không hỏi lại.
glossary:
  GSV: "Gross Sales Value — tổng giá trị đơn hàng (tỷ VNĐ)"
  FR: "Fill Rate — % đơn được nhận trong thời gian SLA (driver chấp nhận / tổng đơn)"
  COGS: "Cost of Goods Sold — phần Ahamove trả driver, tính % trên GSV"
  GXT: "Loại đơn Bulky nhỏ (theo kiện/piece) — target COGS 75K VNĐ/kiện"
  MP: "Mỹ Phước — KCN tại Bình Dương (VSIP II area)"
  KCN: "Khu Công Nghiệp — industrial zone (target SME logistics)"
  3PL: "Third-party logistics — service B2B"
  C2C: "Consumer to consumer"
  SME: "Small/Medium Enterprise"
  AOV: "Average Order Value"
  Bulky: "Loại đơn Truck 500kg-2.5T (e-commerce hàng cồng kềnh)"
  Longhaul: "Đơn Truck liên tỉnh >40km"
  LH: "Longhaul — đơn liên tỉnh >40km"
  EXP: "Expansion zones — các tỉnh ngoài HAN/SGN (Bình Dương, Đồng Nai, Hải Phòng...)"
  P0_P1_P2_P3: "Priority levels (P0=urgent crisis, P3=background)"
  G4_G3_G2_G1: "Grade levels — G4=Manager, G3=Team Lead, G2=Senior, G1=Junior"
  ACT: "Acting (tạm quyền) — e.g. ACT-G3"
  FTL: "Full Truck Load"
  LTL: "Less Than Truck Load (ghép hàng)"
  SLA: "Service Level Agreement"
  NPS: "Net Promoter Score"
  KFM: "Kingfoodmart / Seedlogs — key account Enterprise, chuỗi siêu thị/cửa hàng tiện lợi dùng Ahamove Truck"
  LAN: "Long An — tỉnh đang mở Hub mới (O2 Q2/2026)"
  1st_PU: "1st Pick-Up On-Time — % đơn được driver pick-up đúng giờ slot đầu tiên"
  D30: "Driver retention D30 — % driver còn active sau 30 ngày từ khi onboard"
  WoW: "Week-over-Week — tăng trưởng tuần này so tuần trước"
  MoM: "Month-over-Month — tăng trưởng tháng này so tháng trước"
  YoY: "Year-over-Year — tăng trưởng năm này so năm trước"
