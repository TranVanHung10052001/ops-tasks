  - name: "GHN"
    strength: ["67-73% Bulky e-com wallet share"]
    weakness: ["Thin margins"]
    threat_level: "HIGH"
    overlap_segment: ["Bulky e-commerce"]

  - name: "SPX"
    strength: ["~85% Shopee Instant share"]
    weakness: ["Ops bottleneck at scale"]
    threat_level: "MEDIUM"

