    overlap_segment: ["Key Accounts"]

  - name: "Lalamove"
    strength: ["Global model (Huolala)", "Diverse services"]
    threat_level: "HIGH"
    notes: "Ahamove + Lalamove = ~99% on-demand truck market share"
