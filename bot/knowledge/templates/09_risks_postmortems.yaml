# ─── Postmortem library ──────────────────────────────────────────────────────
# Failures đã xảy ra + lesson learned.
# AI dùng để: trả lời "đã xảy ra issue như này chưa", "lesson nào áp dụng".

postmortems:

  - id: "PM-2025-12-001"
    date: "2025-12-15"
    severity: "P0"
    title: "FR HAN drop 25pp trong 3 ngày — vendor truck vendor V001 down"
    duration: "72 hours"
    impact:
      orders_lost: 8_500
      revenue_lost_vnd: 2_100_000_000
      customer_complaints: 142
    root_cause: |
      Vendor V001 (truck rental HCM nam) bãi xe bị flooding, 60% fleet down.
      Không có backup vendor agreement → không thể spin up backup nhanh.
    contributing_factors:
      - "Backup vendor contract chưa active"
      - "Monitoring vendor health rate lacking — chỉ check monthly"
      - "Alert system không catch real-time"
    timeline:
      - "Day 1 8AM: Vendor báo flooding"
      - "Day 1 11AM: Ops team rà flow → confirm impact"
      - "Day 1 6PM: Manager escalate, find backup"
      - "Day 3 9PM: Backup vendor V002 ramp up"
    resolution:
      - "Backup vendor V002 ramp 40% in 24h"
      - "Customer comms via account manager"
      - "Refund + credit cho 142 KH"
    lessons_learned:
      - "Always have backup vendor agreement pre-signed"
      - "Vendor health check should be daily, not monthly"
      - "Need real-time alert if vendor fleet utilization > 90%"
    action_items:
      - id: "PM-001-A1"
        action: "Sign backup vendor agreement Q1/2026"
        owner: "khanh@ahamove.com"
        deadline: "2026-03-01"
        status: "done"
      - id: "PM-001-A2"
        action: "Build vendor health dashboard real-time"
        owner: "tech_lead@ahamove.com"
        status: "in_progress"

  - id: "PM-2025-09-001"
    date: "2025-09-22"
    severity: "P1"
    title: "(điền postmortem ví dụ 2)"
    impact: {}
    root_cause: "(điền)"
    lessons_learned: []

  # (Add more postmortems...)

