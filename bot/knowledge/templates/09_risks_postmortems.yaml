# Update: monthly (Manager review), sau mỗi incident (postmortem)
# =============================================================================

# ─── Top 10 risks (tracked monthly) ──────────────────────────────────────────
risks:

  - id: "R001"
    name: "FR HAN drop dưới target"
    category: "service_quality"
    probability: "medium"        # low | medium | high
    impact: "high"
    severity_score: 6            # P × I scale 1-9
    description: |
      Hà Nội FR đang trend giảm 3 quarter liên tiếp, nguy cơ < 60% Q2.
      Cause: driver pool aging, Grab tăng promo, traffic ngày càng tệ.
    early_warning_signals:
      - "FR weekly drop > 3pp"
      - "Active drivers HAN MoM growth < 0%"
      - "Complaint count HAN > 50/week"
    mitigation_actions:
      - "Onboard 200 driver Core mới HAN (action 1.1.2)"
      - "Shift incentive 6-9PM peak (action 1.1.1)"
      - "Negotiate promo budget tăng Q3"
    owner: "thong@ahamove.com"
    linked_okr: "O1.2"
    review_date: "2026-05-15"

  - id: "R002"
    name: "COGS Bulky tăng do driver tier mix xấu"
    category: "unit_economics"
    probability: "high"
    impact: "high"
    severity_score: 8
    description: |
      % Mass tier tăng → density per route giảm → driver payout / GSV tăng.
    early_warning_signals:
      - "driver_mass_pct > 30%"
      - "cogs_bulky_pct > 32%"
    mitigation_actions:
      - "Promote 100 Mass → Hub Q2"
      - "Reduce Mass intake new"
    owner: "(email)"
    linked_okr: "O2.1"

  - id: "R003"
    name: "Be Delivery promo war Shopee Instant"
    category: "competitive"
    probability: "high"
    impact: "medium"
    severity_score: 6
    description: |
      Be Delivery burn rate cao, lấy share Shopee Instant. Risk: Shopee giảm
      orders gửi Ahamove → drop revenue.
    early_warning_signals:
      - "Shopee orders MoM drop > 10%"
      - "Be Delivery promo announcement > 1x/month"
    mitigation_actions:
      - "Negotiate exclusive bulky lane với Shopee"
      - "Accelerate SPX overflow capture"
    owner: "(BD lead email)"

  - id: "R004"
    name: "Driver retention Q3 hậu Tết"
    category: "supply"
    probability: "medium"
    impact: "medium"
    severity_score: 4
    description: "Quý 1 hậu Tết driver thường drop 15-20%"

