# ─── Health check rules ──────────────────────────────────────────────────────
risk_rules:
  - rule: "overdue_actions_pct"
    threshold: 0.30                # >30% action overdue → OKR at-risk
    severity: "P1"

  - rule: "kr_current_vs_target_gap"
    threshold: 0.20                # current < target * 0.80 → KR off-track
    severity: "P2"

  - rule: "no_action_progress_days"
    threshold: 7                   # 7 ngày không có update → stalled (strict mode)
    severity: "P2"

  - rule: "p0_action_pending"
    condition: "action với notes chứa 'P0 URGENT' và status='pending'"
    severity: "P0"
    action: "Alert manager ngay + đề xuất owner meeting"
