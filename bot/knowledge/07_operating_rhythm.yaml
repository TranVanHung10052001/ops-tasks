# =============================================================================
# Layer 7 — OPERATING RHYTHM
# =============================================================================
# Mục đích: AI biết cadence — daily 8AM brief, weekly Monday planning,
# monthly all-hands, quarterly OKR set.
#
# Filled: 2026-05-23 (confirmed with team)
# AI dùng để: timing alerts, suggest agenda, detect "missed cadence".
# =============================================================================

# ─── Daily cadence ────────────────────────────────────────────────────────────
daily:
  - id: "morning_brief"
    time: "08:00"
    audience: "All team (11 người)"
    duration_min: 10
    format: "Async — bot DM mỗi member qua Telegram"
    content:
      - "Hôm qua làm gì (done)"
      - "Hôm nay top 3 priorities"
      - "Blocker cần support?"
    owner: "Bot auto-send"
    bot_command: "/today"
    notes: "Ai không report trước 9AM → bot ping nhắc 1 lần"

  - id: "manager_digest"
    time: "08:30"
    audience: "Manager (Lê Quang Huy — huyle@ahamove.com)"
    duration_min: 5
    format: "Bot DM tổng hợp"
    content:
      - "Team status overview (done/blocked/at-risk)"
      - "P0 tasks cần attention"
      - "OKR actions quá hạn hoặc sắp hạn hôm nay"
      - "KPI sáng nay vs target (nếu có)"
    bot_command: "/brief"

  - id: "deadline_check"
    time: "Mỗi 15 phút (auto)"
    type: "auto-check"
    rule: "Nếu task deadline < 2h và chưa done → ping owner 1 lần"
    bot_behavior: "Chỉ ping 1 lần / task / ngày"

  - id: "eod_recap"
    time: "18:00"
    audience: "All"
    format: "Bot DM EOD wrap-up"
    content:
      - "Done today (so với plan buổi sáng)"
      - "Carry-over sang ngày mai"
      - "Nếu có task quá hạn → nêu rõ + hỏi reason"
    bot_command: "(auto-trigger 18:00)"

# ─── Weekly cadence ──────────────────────────────────────────────────────────
weekly:
  - id: "mon_planning"
    day: "Monday"
    time: "09:30"
    duration_min: 60
    audience: "TL+ và manager (in-person hoặc zoom)"
    participants: ["huyle", "thonglhn", "thanhtq", "khanhlv"]   # G3+ only
    agenda:
      - "Recap tuần trước — OKR + KPI vs target"
      - "Priorities tuần này — top 5 per pod (HAN/SGN/B2B)"
      - "Blocker resolution + resource allocation"
      - "Action items từ tuần trước: update status"
    decision_authority: "Manager (huyle)"
    output: "Action items cho tuần — update vào dashboard"

  - id: "wed_mid_check"
    day: "Wednesday"
    time: "16:00"
    duration_min: 30
    audience: "Manager + TL"
    purpose: "Mid-week pulse check — OKR/KPI on track?"
    format: "Async hoặc quick call nếu cần"
    trigger: "Bot nhắc manager lúc 15:45 Wednesday"

  - id: "fri_review"
    day: "Friday"
    time: "17:00"
    duration_min: 90
    audience: "All TL+ + Manager"
    agenda:
      - "Week metrics review (FR, GSV, COGS vs target)"
      - "OKR action status update"
      - "Key wins + key risks"
      - "Decision log tuần này"
    output: "Weekly report → manager → CEO+COO (gửi trước 18:00 Friday)"
    bot_support: "Bot gửi draft weekly report lúc 16:45 để review"
    bot_command: "/weekly_report"

# ─── Monthly cadence ─────────────────────────────────────────────────────────
monthly:
  - id: "month_close"
    day: "Ngày làm việc đầu tiên của tháng"
    time: "09:00"
    audience: "Manager + Finance"
    duration_min: 60
    agenda:
      - "P&L close tháng trước"
      - "Driver tier audit (Station/Core/Hub/Mass mix)"
      - "Customer health review (key accounts)"
      - "Vendor SLA scorecard"
      - "OKR action status — cập nhật progress_pct"
    output: "Monthly close deck → COO"

  - id: "all_hands"
    day: "Thứ 5 tuần thứ 3 của tháng"
    time: "10:00"
    duration_min: 120
    audience: "Toàn team Truck Ops (11 người)"
    participants: "Tất cả m0-m10"
    agenda:
      - "Company update từ Manager (Huy)"
      - "OKR progress Q2 — từng KR"
      - "Highlight thành tích tuần / tháng"
      - "Issues + concerns — open floor Q&A"
      - "Shoutout member (gamification)"
    format: "In-person hoặc hybrid zoom"
    notes: "Bot nhắc manager chuẩn bị agenda trước 2 ngày"

  - id: "kpi_re_allocate"
    day: "Giữa tháng (15th)"
    cadence: "Mỗi 6 tháng (tháng 6 + tháng 12)"
    audience: "Manager"
    purpose: "Re-phân phối KPI weights theo capacity changes của team"
    output: "Updated 04_kpi_dictionary.yaml + grade_matrix.json"

# ─── Quarterly cadence ───────────────────────────────────────────────────────
quarterly:
  - id: "okr_set"
    timing: "1 tuần trước khi quarter mới bắt đầu"
    audience: "Manager + TL + CEO review"
    output: "03_okr_tree.yaml updated + approved"
    decision_authority: "CEO approve, Manager set"
    bot_reminder: "Bot nhắc 2 tuần trước kết thúc quarter"

  - id: "okr_review"
    timing: "Tuần cuối của quarter"
    audience: "All TL+"
    agenda:
      - "Mỗi OKR: % done, learnings, implication cho Q tiếp"
      - "What worked / didn't work"
      - "Team retrospective"
    output: "Postmortem doc per OKR → lưu vào 09_risks_postmortems.yaml"

  - id: "compensation_review"
    timing: "Cuối Q2 + cuối Q4"
    audience: "Manager + HR"
    purpose: "Review salary, grade promotion, performance bonus"

# ─── Reporting deliverables ──────────────────────────────────────────────────
deliverables:
  - id: "daily_dashboard"
    audience: "Manager + TL"
    medium: "Web dashboard /ask + Telegram /brief"
    delivery_time: "08:30 auto"
    bot_generates: true

  - id: "weekly_report"
    audience: "CEO + COO (Lê Hữu Chung)"
    medium: "Text report qua Telegram/Slack"
    delivery_time: "Friday 18:00"
    bot_generates: true
    template: "Bot draft, Manager review + send"

  - id: "monthly_review_deck"
    audience: "COO + Board"
    medium: "Google Slides"
    delivery_time: "Ngày 5 của tháng tiếp"
    owner: "Manager (huyle@ahamove.com)"
    bot_generates: false

  - id: "quarterly_board_pack"
    audience: "Board"
    medium: "PDF + presentation"
    timing: "2 tuần trước board meeting"
    owner: "Manager"

# ─── External calendar (peak / off-peak) ─────────────────────────────────────
external_events:
  - name: "Tết Nguyên Đán"
    timing: "Tháng 1-2"
    impact: "Driver pool drop 40%, FR risk P0, GSV +30% pre-Tết"
    action: "Surge pricing + driver bonus incentive 2 tuần trước Tết"
    lead_time_days: 14

  - name: "11.11 / 12.12 / Black Friday"
    timing: "Tháng 11-12"
    impact: "Order volume +200% peak day (e-commerce)"
    action: "Pre-warm driver pool, freeze deploy 1 tuần trước"
    lead_time_days: 7

  - name: "Mid-Autumn (Trung Thu)"
    timing: "Tháng 9"
    impact: "Bulky orders peak (mooncake, quà tặng)"
    action: "Chuẩn bị extra truck capacity 2 tuần trước"

  - name: "Quý 1 hậu Tết slow"
    timing: "Tháng 3-4"
    impact: "Demand giảm, driver churn risk cao"
    action: "Retention focus, giảm Mass intake, push upgrade Core"

  - name: "Mùa mưa HCM (Monsoon)"
    timing: "Tháng 6-10"
    impact: "Vendor bãi xe risk flooding → fleet down 30-60%"
    action: "Activate backup vendor protocol (xem 09_risks.yaml FM-001)"
    risk_ref: "FM-001"

# ─── Definition of time periods — AI parse câu hỏi đúng ──────────────────────
period_definitions:
  this_week:   "Monday 00:00 → Sunday 23:59 (tuần hiện tại)"
  last_week:   "Monday → Sunday tuần trước"
  this_month:  "1st → last day tháng hiện tại"
  last_month:  "1st → last day tháng trước"
  this_quarter: "Q2/2026 = 01/04 → 30/06/2026"
  ytd:         "Year to date — 01/01 → today"
  today:       "00:00 → 23:59 hôm nay GMT+7"
  timezone:    "Asia/Ho_Chi_Minh (GMT+7)"

# ─── Team working hours ──────────────────────────────────────────────────────
working_hours:
  normal: "08:00 - 18:00 Monday-Friday"
  field_ops: "06:00 - 22:00 (driver ops coverage)"
  urgent_contact: "Manager Huy: always reachable for P0"
  bot_alert_window: "07:00 - 21:00"     # Bot không alert outside this window trừ P0
